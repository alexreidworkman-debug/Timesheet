<style>
:root{
  --bg:#f0f0f0;--white:#fff;--k:#111;--bdr:#bbb;
  --muted:#888;--lite:#ebebeb;--y:#f5c518;--red:#c33;
  --fb:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --fm:'Courier New',monospace;
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--k);font-family:var(--fb);
     padding:calc(var(--st) + 10px) 0 calc(var(--sb) + 30px);}

/* TOP BAR */
.topbar{background:var(--white);border-bottom:2px solid var(--k);
  padding:10px 14px;display:flex;align-items:center;
  justify-content:space-between;gap:10px;margin-bottom:12px;}
.rbq{font-size:.58rem;color:var(--muted);margin-top:3px;}
.wnav{display:flex;align-items:center;gap:2px;border:1.5px solid var(--k);
  border-radius:7px;padding:3px 6px;font-family:var(--fm);font-size:.72rem;}
.wnav button{background:none;border:none;font-size:1.2rem;min-width:36px;min-height:36px;cursor:pointer;}

/* WEEK LABEL */
.wklbl{text-align:center;font-family:var(--fm);font-size:.7rem;color:var(--muted);
  margin-bottom:12px;padding:0 14px;}

/* INSTALL BANNER */
.ibanner{display:none;background:var(--k);color:var(--white);margin:0 12px 12px;
  border-radius:8px;padding:11px 13px;font-size:.72rem;line-height:1.5;
  gap:8px;align-items:flex-start;}
.ibanner.on{display:flex;}
.ibanner strong{color:var(--y);display:block;margin-bottom:2px;}
.idis{background:none;border:none;color:#888;font-size:1.3rem;cursor:pointer;margin-left:auto;}

/* BUTTONS */
.btn{font-family:var(--fm);font-size:.68rem;font-weight:700;letter-spacing:.8px;
  text-transform:uppercase;padding:9px 15px;border-radius:6px;
  border:1.5px solid var(--k);background:var(--white);color:var(--k);
  cursor:pointer;min-height:40px;}
.btn:active{background:var(--lite);}
.bd{background:var(--k);color:var(--white);}
.bd:active{background:#333;}
.actrow{display:flex;gap:8px;flex-wrap:wrap;padding:14px 12px 0;}

/* WORKERS */
.workers{padding:0 12px;display:flex;flex-direction:column;gap:16px;}

/* WORKER CARD */
.wcard{background:var(--white);border:2px solid var(--k);border-radius:10px;overflow:hidden;}

/* Worker name section */
.wnamesec{padding:12px 14px 10px;border-bottom:2px solid var(--k);
  display:flex;align-items:flex-end;justify-content:space-between;gap:8px;}
.wnameleft{flex:1;min-width:0;}
.wnameleft label{font-family:var(--fm);font-size:.58rem;font-weight:700;
  color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;
  display:block;margin-bottom:5px;}
.wnameinput{width:100%;font-family:var(--fm);font-size:1.45rem;font-weight:700;
  color:var(--k);background:none;border:none;border-bottom:1.5px solid var(--bdr);
  outline:none;padding:2px 2px 4px;letter-spacing:.5px;}
.wnameinput::placeholder{color:#ccc;font-weight:400;}
.wremove{font-family:var(--fm);font-size:.6rem;font-weight:700;letter-spacing:.5px;
  text-transform:uppercase;padding:6px 10px;border-radius:5px;
  border:1px solid var(--bdr);background:none;color:var(--muted);cursor:pointer;
  white-space:nowrap;flex-shrink:0;}
.wremove:active{color:var(--red);border-color:var(--red);}

/* GRID — scrollable horizontally on small screens */
.grid-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.grid{display:grid;
  grid-template-columns:110px repeat(7,minmax(42px,1fr)) 58px;
  min-width:520px;width:100%;border-collapse:collapse;}

/* Column headers */
.gh{background:var(--lite);border-bottom:1.5px solid var(--k);
  border-right:1px solid var(--bdr);
  font-family:var(--fm);font-size:.58rem;font-weight:700;
  color:var(--muted);text-align:center;padding:5px 3px;letter-spacing:.3px;}
.gh:first-child{text-align:left;padding-left:9px;color:var(--k);font-size:.6rem;}
.gh:last-child{border-right:none;color:var(--k);font-size:.6rem;}

/* Project / client name cell */
.pname{border-right:1px solid var(--bdr);border-bottom:1px solid var(--lite);
  padding:4px 6px;display:flex;align-items:center;}
.pname input{width:100%;background:none;border:none;
  border-bottom:1px solid #e0e0e0;
  font-family:var(--fb);font-size:.8rem;outline:none;
  color:var(--k);padding:3px 0;}
.pname input::placeholder{color:#ccc;}

/* Hours cell */
.hcell{border-right:1px solid #e8e8e8;border-bottom:1px solid var(--lite);
  display:flex;align-items:center;justify-content:center;}
.hcell input{width:100%;background:none;border:none;text-align:center;
  font-family:var(--fm);font-size:.92rem;outline:none;
  color:var(--k);padding:7px 2px;-webkit-appearance:none;}
.hcell input::placeholder{color:#ddd;}

/* Row total */
.rtot{border-left:1.5px solid var(--k);border-bottom:1px solid var(--lite);
  background:var(--lite);display:flex;align-items:center;justify-content:center;}
.rtot span{font-family:var(--fm);font-size:.92rem;font-weight:700;color:var(--k);}

/* Day totals row */
.dtlbl{background:var(--lite);border-top:2px solid var(--k);
  border-right:1px solid var(--bdr);
  font-family:var(--fm);font-size:.58rem;font-weight:700;
  color:var(--k);padding:6px 6px 6px 9px;
  display:flex;align-items:center;letter-spacing:.3px;}
.dtval{background:var(--lite);border-top:2px solid var(--k);
  border-right:1px solid var(--bdr);
  font-family:var(--fm);font-size:.92rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;padding:6px 2px;}
.dtgrand{background:var(--y);border-top:2px solid var(--k);
  border-left:2px solid var(--k);
  font-family:var(--fm);font-size:1rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;padding:6px 2px;}

/* NOTES */
.notes{margin:14px 12px 0;background:var(--white);
  border:2px solid var(--k);border-radius:10px;overflow:hidden;}
.nhdr{background:var(--k);padding:9px 13px;display:flex;align-items:center;justify-content:space-between;}
.nhdr span{font-family:var(--fm);font-size:.68rem;font-weight:700;
  color:var(--white);letter-spacing:1px;text-transform:uppercase;}
.micbtn{background:none;border:1.5px solid #555;border-radius:20px;
  color:var(--white);font-size:.68rem;padding:5px 11px;cursor:pointer;
  font-family:var(--fm);display:flex;align-items:center;gap:5px;min-height:32px;}
.micbtn.on{border-color:var(--red);color:var(--red);}
.mdot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0;}
.notes textarea{width:100%;min-height:80px;height:auto;padding:12px;background:none;
  border:none;outline:none;resize:none;font-family:var(--fb);overflow:hidden;
  font-size:.85rem;line-height:1.6;color:var(--k);}
.notes textarea::placeholder{color:#bbb;font-style:italic;}

/* SAVED */
.saved{margin:18px 12px 0;border-top:1px solid var(--bdr);padding-top:14px;}
.savttl{font-family:var(--fm);font-size:.68rem;font-weight:700;
  text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px;}
.savlist{display:flex;flex-direction:column;gap:6px;}
.sitem{background:var(--white);border:1px solid var(--bdr);border-radius:7px;
  padding:10px 12px;display:flex;align-items:center;
  justify-content:space-between;cursor:pointer;gap:8px;}
.sitem:active{background:var(--lite);}
.sw{font-family:var(--fm);font-size:.78rem;font-weight:700;}
.sd{font-family:var(--fm);font-size:.63rem;color:var(--muted);margin-top:2px;}

/* EXPORT MODAL */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);
  z-index:200;align-items:center;justify-content:center;padding:18px;}
.mbg.open{display:flex;}
.modal{background:var(--white);border:2px solid var(--k);border-radius:10px;
  padding:16px;width:100%;max-width:440px;
  display:flex;flex-direction:column;gap:10px;}
.modal h2{font-family:var(--fm);font-size:.95rem;}
.modal p{font-size:.76rem;color:var(--muted);line-height:1.5;}
.modal textarea{min-height:120px;background:var(--lite);border:1px solid var(--bdr);
  border-radius:6px;padding:9px;font-family:var(--fm);font-size:.6rem;
  resize:none;outline:none;}
.mbtns{display:flex;gap:8px;}

/* PRINT */
@media print{
  @page{size:landscape;margin:9mm;}
  body{background:white;padding:0;}
  .ibanner,.actrow,.saved,.mbg,.micbtn,.wnav button,.topbar > .wnav,
  .wremove{display:none!important;}
  .topbar{border-bottom:2px solid black;margin-bottom:5px;padding:5px 0;}
  .workers{padding:0;gap:8px;}
  .wcard{break-inside:avoid;page-break-inside:avoid;}
  .nhdr{background:black!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .notes{break-inside:avoid;margin:6px 0 0;}
  .notes textarea{display:none!important;}
  .notes-print{display:block!important;padding:10px 12px;font-size:.8rem;line-height:1.6;white-space:pre-wrap;word-break:break-word;}
  .dtgrand{background:#f5c518!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .gh{background:#eee!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .dtlbl,.dtval{background:#eee!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  input{border:none!important;}
  .pname input{border-bottom:.4px solid #ccc!important;}
}
</style>
</head>

<script>
const DAYS=['SUN','MON','TUE','WED','THU','FRI','SAT'];
const N_ROWS=6;
let woff=0;

function mkRows(){
  return Array.from({length:N_ROWS},()=>({proj:'',hrs:Array(7).fill('')}));
}

// ── Default state ─────────────────────────────────────────────
let ST={
  workers:[
    {name:'DOV', rows:mkRows()},
    {name:'LP',  rows:mkRows()},
    {name:'SP',  rows:mkRows()}
  ],
  notes:''
};

// ── Week helpers ──────────────────────────────────────────────
function getSun(off=0){
  const d=new Date();d.setHours(0,0,0,0);
  d.setDate(d.getDate()-d.getDay()+off*7);return d;
}
// Get Sunday date as YYYY-MM-DD string — used as the stable key for each week
function sunKey(off=0){
  const s=getSun(off);
  return s.toISOString().slice(0,10);
}
// Get offset from today's Sunday to a given YYYY-MM-DD Sunday string
function offFromKey(key){
  const todaySun=getSun(0);
  const keySun=new Date(key+'T12:00:00'); // noon to avoid DST edge
  const ms=keySun-todaySun;
  return Math.round(ms/(7*24*60*60*1000));
}
function fmtS(d){return d.toLocaleDateString('en-CA',{month:'short',day:'numeric'});}
function fmtL(d){return d.toLocaleDateString('en-CA',{month:'long',day:'numeric',year:'numeric'});}
function updateWeekUI(){
  const s=getSun(woff),e=new Date(s);e.setDate(s.getDate()+6);
  document.getElementById('wkLabel').textContent=fmtS(s)+' – '+fmtS(e);
  document.getElementById('wklbl').textContent='Week of '+fmtL(s)+' to '+fmtL(e);
}
function shiftWeek(d){
  woff+=d;
  const key=sunKey(woff);
  localStorage.setItem('wm_last_key', key);
  const all=JSON.parse(localStorage.getItem('wm_v5')||'[]');
  const saved=all.find(w=>w.key===key);
  if(saved){
    ST=saved.ST;
    ST.workers.forEach(w=>{while(w.rows.length<N_ROWS)w.rows.push({proj:'',hrs:Array(7).fill('')});});
  } else {
    ST={workers:ST.workers.map(w=>({name:w.name,rows:mkRows()})),notes:''};
  }
  updateWeekUI();render();
}

// ── Render ────────────────────────────────────────────────────
function render(){
  const wrap=document.getElementById('workers');
  wrap.innerHTML='';
  ST.workers.forEach((w,wi)=>{
    const card=document.createElement('div');
    card.className='wcard';

    // ── Worker name header ──
    card.innerHTML=`
      <div class="wnamesec">
        <div class="wnameleft">
          <label>NOM DE L'OUVRIER / WORKER NAME</label>
          <input class="wnameinput" type="text" inputmode="text"
            value="${x(w.name)}" placeholder="Tap to enter worker name"
            oninput="ST.workers[${wi}].name=this.value">
        </div>
        <button class="wremove" onclick="removeWorker(${wi})">Remove</button>
      </div>`;

    // ── Hours grid ──
    const gwrap=document.createElement('div');
    gwrap.className='grid-wrap';
    const g=document.createElement('div');
    g.className='grid';

    // Column headers
    g.innerHTML+=`<div class="gh">PROJECT / CLIENT</div>`;
    DAYS.forEach(d=>g.innerHTML+=`<div class="gh">${d}</div>`);
    g.innerHTML+=`<div class="gh">WEEK<br>TOTAL</div>`;

    // Project rows — each fully editable
    w.rows.forEach((row,ri)=>{
      const rowTot=row.hrs.reduce((a,h)=>a+(pf(h)||0),0);

      // Project name cell — fully editable, tap to change
      g.innerHTML+=`<div class="pname">
        <input type="text" inputmode="text"
          value="${x(row.proj)}" placeholder="Project / client"
          oninput="ST.workers[${wi}].rows[${ri}].proj=this.value">
      </div>`;

      // Hour cells per day
      row.hrs.forEach((h,di)=>{
        g.innerHTML+=`<div class="hcell">
          <input type="text" inputmode="decimal" pattern="[0-9]*[.,]?[0-9]*"
            value="${h||''}" placeholder=""
            oninput="setH(${wi},${ri},${di},this.value)">
        </div>`;
      });

      // Row total (this project, all week)
      g.innerHTML+=`<div class="rtot"><span id="rt_${wi}_${ri}">${rowTot||''}</span></div>`;
    });

    // Day totals row — total hours this worker worked each day
    const dayTots=DAYS.map((_,di)=>w.rows.reduce((a,r)=>a+(pf(r.hrs[di])||0),0));
    const grand=dayTots.reduce((a,b)=>a+b,0);

    g.innerHTML+=`<div class="dtlbl">DAY<br>TOTAL</div>`;
    dayTots.forEach((t,di)=>g.innerHTML+=`<div class="dtval" id="dt_${wi}_${di}">${t||''}</div>`);
    g.innerHTML+=`<div class="dtgrand" id="grand_${wi}">${grand||''}</div>`;

    gwrap.appendChild(g);
    card.appendChild(gwrap);
    wrap.appendChild(card);
  });

  document.getElementById('notestxt').value=ST.notes;
  document.getElementById('notesprint').textContent=ST.notes;
  autoGrow(document.getElementById('notestxt'));
}

function setH(wi,ri,di,val){
  ST.workers[wi].rows[ri].hrs[di]=val.replace(',','.');
  updateTotals(wi);
}
function updateTotals(wi){
  const w=ST.workers[wi];
  // Update each row total
  w.rows.forEach((row,ri)=>{
    const t=row.hrs.reduce((a,h)=>a+pf(h),0);
    const el=document.getElementById('rt_'+wi+'_'+ri);
    if(el) el.textContent=t||'';
  });
  // Update each day total
  const dayTots=DAYS.map((_,di)=>w.rows.reduce((a,r)=>a+pf(r.hrs[di]),0));
  dayTots.forEach((t,di)=>{
    const el=document.getElementById('dt_'+wi+'_'+di);
    if(el) el.textContent=t||'';
  });
  // Update grand total
  const grand=dayTots.reduce((a,b)=>a+b,0);
  const gel=document.getElementById('grand_'+wi);
  if(gel) gel.textContent=grand||'';
}
function pf(v){ return parseFloat(String(v).replace(',','.')) || 0; }

// ── Add / remove workers ──────────────────────────────────────
function addWorker(){
  ST.workers.push({name:'',rows:mkRows()});
  render();
  // Scroll to new worker and focus name input
  setTimeout(()=>{
    const cards=document.querySelectorAll('.wcard');
    const last=cards[cards.length-1];
    last.scrollIntoView({behavior:'smooth',block:'start'});
    last.querySelector('.wnameinput').focus();
  },100);
}
function removeWorker(wi){
  if(ST.workers.length<=1){alert('Need at least one worker.');return;}
  const nm=ST.workers[wi].name||'this worker';
  if(!confirm('Remove '+nm+'?'))return;
  ST.workers.splice(wi,1);
  render();
}

// ── Notes auto-grow & auto-date ───────────────────────────────
function autoGrow(el){
  el.style.height='auto';
  el.style.height=(el.scrollHeight)+'px';
}
function autoDateNote(){
  const ta=document.getElementById('notestxt');
  const dayNames=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const now=new Date();
  // Current day name and date
  const stamp='— '+dayNames[now.getDay()]+', '+now.toLocaleDateString('en-CA',{month:'long',day:'numeric',year:'numeric'})+' —';
  // Only insert if this exact day stamp isn't already in the notes
  if(!ta.value.includes(stamp)){
    ta.value=(ta.value.trim()?(ta.value.trim()+'\n\n'):'')+stamp+'\n';
    ST.notes=ta.value;
    // Move cursor to end
    ta.selectionStart=ta.selectionEnd=ta.value.length;
  }
  autoGrow(ta);
}

// ── Voice notes ───────────────────────────────────────────────
let recog=null,recogOn=false;
function toggleMic(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('Voice notes work in Safari on iPhone.');return;}
  if(recogOn){recog.stop();return;}
  autoDateNote(); // stamp the day when mic is pressed
  recog=new SR();
  recog.lang='en-CA';recog.continuous=true;recog.interimResults=false;
  recog.onstart=()=>{recogOn=true;document.getElementById('micbtn').classList.add('on');document.getElementById('miclbl').textContent='Stop';};
  recog.onresult=e=>{
    const t=Array.from(e.results).map(r=>r[0].transcript).join(' ');
    const ta=document.getElementById('notestxt');
    ta.value=(ta.value?ta.value+' ':'')+t;ST.notes=ta.value;
    autoGrow(ta);
    document.getElementById('notesprint').textContent=ta.value;
  };
  recog.onend=()=>{recogOn=false;document.getElementById('micbtn').classList.remove('on');document.getElementById('miclbl').textContent='Speak';};
  recog.onerror=()=>recog.stop();
  recog.start();
}

// ── Save / load ───────────────────────────────────────────────
function saveWeek(){
  const key=sunKey(woff);
  const s=getSun(woff),e=new Date(s);e.setDate(s.getDate()+6);
  const data={key,lbl:fmtS(s)+' – '+fmtS(e),ST:JSON.parse(JSON.stringify(ST)),at:new Date().toISOString()};
  const all=JSON.parse(localStorage.getItem('wm_v5')||'[]');
  const idx=all.findIndex(w=>w.key===key);
  if(idx>=0)all[idx]=data;else all.unshift(data);
  localStorage.setItem('wm_v5',JSON.stringify(all));
  localStorage.setItem('wm_last_key',key);
  renderSaved();
  const btn=event.target;btn.textContent='Saved ✓';
  setTimeout(()=>btn.textContent='Save Week',1600);
}
function loadWeek(raw){
  const d=typeof raw==='string'?JSON.parse(raw):raw;
  // Use stored date key to calculate correct offset from today
  const key=d.key||(d.woff!==undefined ? sunKey(d.woff) : sunKey(0));
  woff=offFromKey(key);
  ST=d.ST;
  ST.workers.forEach(w=>{while(w.rows.length<N_ROWS)w.rows.push({proj:'',hrs:Array(7).fill('')});});
  localStorage.setItem('wm_last_key',key);
  updateWeekUI();render();window.scrollTo({top:0,behavior:'smooth'});
}
function delWeek(i,e){
  e.stopPropagation();
  if(!confirm('Delete this saved week?'))return;
  const all=JSON.parse(localStorage.getItem('wm_v5')||'[]');
  all.splice(i,1);localStorage.setItem('wm_v5',JSON.stringify(all));renderSaved();
}
function renderSaved(){
  const all=JSON.parse(localStorage.getItem('wm_v5')||'[]');
  const el=document.getElementById('savlist');
  if(!all.length){el.innerHTML='<div style="font-size:.73rem;color:var(--muted)">No saved weeks yet.</div>';return;}
  el.innerHTML=all.map((s,i)=>{
    const hrs=(s.ST?.workers||[]).reduce((a,w)=>a+w.rows.reduce((b,r)=>b+r.hrs.reduce((c,h)=>c+(pf(h)||0),0),0),0);
    const names=(s.ST?.workers||[]).map(w=>w.name).filter(Boolean).join(', ');
    return `<div class="sitem" onclick='loadWeek(${JSON.stringify(JSON.stringify(s))})'>
      <div>
        <div class="sw">${s.lbl||'Week'}</div>
        <div class="sd">${names||'No workers'} · ${hrs} hrs</div>
      </div>
      <button class="btn" style="font-size:.6rem;padding:5px 9px;color:var(--red);border-color:var(--bdr)"
        onclick="delWeek(${i},event)">Delete</button>
    </div>`;
  }).join('');
}

// ── Export ────────────────────────────────────────────────────
function openExport(){
  document.getElementById('exptxt').value='<!DOCTYPE html>\n'+document.documentElement.outerHTML;
  document.getElementById('expmodal').classList.add('open');
}
function closeExp(){document.getElementById('expmodal').classList.remove('open');}
function copyExp(){
  const ta=document.getElementById('exptxt');ta.select();
  navigator.clipboard.writeText(ta.value).catch(()=>document.execCommand('copy'));
  const b=document.querySelector('.mbtns .bd');
  b.textContent='Copied ✓';setTimeout(()=>b.textContent='Copy All',1800);
}
document.getElementById('expmodal').addEventListener('click',function(e){if(e.target===this)closeExp();});

// ── Install banner ────────────────────────────────────────────
function dismissBanner(){document.getElementById('ib').classList.remove('on');localStorage.setItem('wm_ib','1');}
if(/iphone|ipad|ipod/i.test(navigator.userAgent)&&!window.navigator.standalone&&!localStorage.getItem('wm_ib'))
  document.getElementById('ib').classList.add('on');

// ── Escape helper ─────────────────────────────────────────────
function x(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── Init ──────────────────────────────────────────────────────
// Use stored date key to find and load last used week
const _lastKey = localStorage.getItem('wm_last_key') || sunKey(0);
woff = offFromKey(_lastKey);
const _all = JSON.parse(localStorage.getItem('wm_v5')||'[]');
const _thisWeek = _all.find(w => (w.key||sunKey(w.woff||0)) === _lastKey);
if (_thisWeek) {
  ST = _thisWeek.ST;
  ST.workers.forEach(w => { while(w.rows.length < N_ROWS) w.rows.push({proj:'',hrs:Array(7).fill('')}); });
}
updateWeekUI();
render();
renderSaved();
</script>
